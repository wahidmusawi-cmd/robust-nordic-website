<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>RN Pusher</title>
<style>body{font-family:monospace;background:#0d3d66;color:#f1eeed;padding:20px}#log{background:#000820;border:1px solid #1a4f80;padding:10px;height:400px;overflow-y:auto;font-size:12px;white-space:pre-wrap}.ok{color:#4caf50}.err{color:#f44336}.info{color:#6590b2}#st{padding:8px;background:#1a4f80;margin-bottom:8px}input[type=file]{display:none}label{display:inline-block;padding:10px 20px;background:#6590b2;color:white;cursor:pointer;border-radius:4px;margin:10px 0}</style>
</head><body>
<h2>Robust Nordic GitHub Push</h2>
<div id="st">Ready - upload all_files.json</div>
<label>Upload all_files.json<input type="file" id="fi" accept=".json"></label>
<div id="log"></div>
<script>
function log(m,c=''){var el=document.getElementById('log');el.innerHTML+='<span class="'+c+'">'+m+'\n</span>';el.scrollTop=el.scrollHeight}
function st(m){document.getElementById('st').textContent=m}
document.getElementById('fi').addEventListener('change',async function(e){
  var file=e.target.files[0];if(!file)return;
  st('Reading...');
  var text=await file.text();
  var p=JSON.parse(text);
  var existing=p._meta.existing_shas,repo=p._meta.repo,tok=p._meta.token,msg=p._meta.commit_msg,files=p.files;
  async function api(m,u,b){var r=await fetch('https://api.github.com'+u,{method:m,headers:{'Authorization':'token '+tok,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},body:b?JSON.stringify(b):undefined});return r.json()}
  log(Object.keys(files).length+' files + '+Object.keys(existing).length+' existing','info');
  var ref=await api('GET','/repos/'+repo+'/git/ref/heads/main');
  var base=ref.object.sha;
  var cd=await api('GET','/repos/'+repo+'/git/commits/'+base);
  var bt=cd.tree.sha;
  log('HEAD: '+base.slice(0,12)+' tree: '+bt.slice(0,12),'info');
  var shas=Object.assign({},existing);
  var i=0,tot=Object.keys(files).length;
  for(var[path,b64]of Object.entries(files)){
    var res=await api('POST','/repos/'+repo+'/git/blobs',{content:b64,encoding:'base64'});
    if(res&&res.sha){shas[path]=res.sha;i++;if(i%10===0||i===tot)log('['+i+'/'+tot+'] '+path,'ok');st('Blobs '+i+'/'+tot)}
    else{log('ERR '+path+': '+JSON.stringify(res),'err')}
  }
  log('All SHAs: '+Object.keys(shas).length,'info');
  st('Creating tree...');
  var tree=await api('POST','/repos/'+repo+'/git/trees',{base_tree:bt,tree:Object.entries(shas).map(([p,s])=>({path:p,mode:'100644',type:'blob',sha:s}))});
  log('Tree: '+tree.sha.slice(0,12),'info');
  st('Committing...');
  var cm=await api('POST','/repos/'+repo+'/git/commits',{message:msg,tree:tree.sha,parents:[base]});
  log('Commit: '+cm.sha.slice(0,12),'info');
  var up=await api('PATCH','/repos/'+repo+'/git/refs/heads/main',{sha:cm.sha,force:true});
  if(up&&up.object){log('\nSUCCESS! '+Object.keys(shas).length+' files pushed!','ok');log('https://github.com/'+repo,'ok');st('DONE: '+Object.keys(shas).length+' files @ '+cm.sha.slice(0,12))}
  else{log('ERR ref: '+JSON.stringify(up),'err')}
});
</script></body></html>
